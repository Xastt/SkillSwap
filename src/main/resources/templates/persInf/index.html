<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <meta charset="UTF-8">
    <title>Index</title>
    <style>
        form{
            max-width: 0px;
            background: none;
            padding: 2px;
            margin-left: 0;
            box-shadow: 0 0 0px rgba(0, 0, 0, 0.1);
        }
        td{
            width: 80px;
        }
    </style>
</head>
<body>
<article>
    <header>
        <nav class="clear">
            <ul>
                <li><a href="/profInf/new">Provide Skill</a></li>
                <li><a href="/">Find Skill</a></li>
                <!--<li><a href="/profInf/new">Log Out</a></li> Лог аут(если нужен)-->
            </ul>
        </nav>
        <h1>SkillSwap</h1>
    </header>

    <ul>
        <h1>Наполнение страницы</h1>
        <div class = "for-list">
            <p>-------------</p>
        </div>
        <!--Рассказать про важность навыков и обучения или еще что-то + слайды листаются-->
    </ul>

    <table>
        <tr>
            <td><form th:action="@{/logout}" th:method="POST">
                <input type = "submit" value = "Logout"/>
            </form></td>
        </tr>
    </table>

    <ul>
        <h1>Skills list:</h1>
        <div class = "for-list">
            <p th:each="skill : ${profInf}">
                <a th:href="@{/profInf/{id}(id=${skill.getId()})}"
                   th:text="${skill.getSkillName() + ', ' + skill.getCost()}">user</a>
            </p>
        </div>
    </ul>

</article>
</body>
</html>
